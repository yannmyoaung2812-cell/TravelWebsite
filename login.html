<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-200 h-screen flex justify-center items-center">
    <main class="sm:w-full md:w-1/3 bg-white px-10 p-5 sm:mx-1 md:mx-auto rounded-lg">
        <section class="text-center mb-5">
            <img src="welcome.png" class="w-20 h-20 mx-auto"/>
            <p class="text-4xl font-extrabold">Welcome Back</p>
            <p>Enter your credentials to access your account</p>
        </section>
        <section class="mb-5">
            <p class="font-bold text-left">Email Address</p>
            <input type="text" placeholder="  name@company.com" class="w-full border border-black rounded-lg mb-5">
            <p class="font-bold text-left">Password</p>
            <input type="password" placeholder="  *******" class="w-full border font-bold border-black rounded-lg">
        </section>
        <section class="w-full flex flex-rows justify-between">
            <div class="flex">
                <input type="checkbox">
                <p>Remember me</p>
            </div>    
            <div class="text-blue-600">
                <a href="#">Forget Password?</a>
            </div>
        </section>
        <button class="w-full  bg-blue-600 hover:scale-x-105 hover:bg-blue-300 p-3 rounded-lg text-white font-bold text-lg my-5 ">Log In</button>
        <section class="flex gap-3 justify-center">
            <p>Don't have an account yet?</p>
            <a class="text-blue-600">Sign up for free</a>
        </section>
    </main>
</body>
</html>
