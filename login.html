<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-200 h-screen flex justify-center items-center">
    <main class="max-w-lg bg-white p-5 rounded-xl shadow-xl">
        <section class="text-center mb-5">
            <img src="welcome.png" class="w-16 p-4 bg-blue-200 rounded-2xl mx-auto" />
            <p class="text-3xl font-semibold">Welcome Back</p>
            <p class="text-gray-500">
                Enter your credentials to access your account
            </p>
        </section>

        <div class="mb-5 grid grid-cols-1">
            <div>
                <label class="font-bold text-left">Email Address</label>
                <input type="text" placeholder="name@company.com" class="w-full p-2 border rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label class="font-bold text-left">Password</label>
                <input type="password" placeholder="*******" class="w-full focus:outline-none focus:ring-2 focus:ring-blue-500 border p-2 rounded-xl" />
            </div>
        </div>

        <section class="w-full flex flex-rows justify-between">
            <div class="flex">
                <input type="checkbox" />
                <p>Remember me</p>
            </div>
            <div class="text-blue-600">
                <a href="#">Forget Password?</a>
            </div>
        </section>
        <button
            class="w-full bg-blue-600 hover:scale-x-105 hover:bg-blue-300 p-3 rounded-lg text-white font-bold text-lg my-5">
            Log In
        </button>
        <section class="flex gap-3 justify-center">
            <p>Don't have an account yet?</p>
            <a href="registerform.html" class="text-blue-600">Sign up for free</a>
        </section>
    </main>
</body>

</html>
