<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-200  h-screen flex justify-center items-center">
    <main class="sm:w-full md:w-1/3 bg-white px-10 py-5 sm:mx-1 md:mx-auto rounded-lg">
        <div class="text-center mb-5">
            <img src="register.png" class="w-20 h-20 mx-auto"/>
            <h1 class="text-4xl font-extrabold">Create Account</h1>
            <p>Join us today! It only takes a minute.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5 text-left font-bold">
        <div>
            <p>Full Name</p>
            <input type="text" placeholder="  John Doe" class="rounded-lg border border-gray-950 w-full">        
        </div>
        <div>
            <p>Email Address</p>
            <input type="email" placeholder="  name@company.com" class="rounded-lg border border-gray-950 w-full">        
        </div>
        </div>
        <div class="mb-5 text-left font-bold">
            <p>Password</p>
            <input type="password" placeholder="  *******" class="w-full border border-black rounded-lg">
        </div>
        <div class="text-left font-bold mb-5">
            <p>Confirm Password</p>
            <input type="password" placeholder="  *******" class="w-full border border-black rounded-lg">
        </div>
        <div class="flex justify-start gap-2 mb-5 sm:text-xs md:text-base">
            <input type="checkbox">
            <p>I agree to the</p>
            <a class="text-indigo-900">Terms of Service</a>
            <p> and </p>
            <a class="text-indigo-900">Privacy Policy.</a>
        </div>
        <div class="text-white font-bold text-lg mb-5">
        <button class="w-full bg-indigo-800 hover:scale-x-105 hover:bg-blue-300 p-3 rounded-lg">Create My Account >></button>
        </div>
        <div class="flex justify-center gap-3">
            <p>Already have an account?</p>
            <a href="#" class="text-indigo-900">Sign in here</a>
        </div>
    </main>
</body>
</html>
