<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-200  h-screen flex justify-center items-center">
    <main class="w-fulls md:w-1/3 bg-white px-10 py-5 sm:mx-1 md:mx-auto rounded-xl shadow-xl">
        <div class="text-center mb-5">
            <img src="register.png" class="w-16 p-4 bg-blue-200 rounded-2xl mx-auto mb-3"/>
            <h1 class="text-4xl font-extrabold">Create Account</h1>
            <p>Join us today! It only takes a minute.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-5 text-left font-bold">
        <div>
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" class="rounded-lg border w-full p-2 focus:outline-none focus:ring-2 focus:ring-indigo-800">        
        </div>
        <div>
            <label>Email Address</label>
            <input type="email" placeholder="name@company.com" class="rounded-lg border w-full p-2 focus:outline-none focus:ring-2 focus:ring-indigo-800">        
        </div>
        </div>
        <div class="mb-5 text-left font-bold">
            <label>Password</label>
            <input type="password" placeholder="*******" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800">
        </div>
        <div class="text-left font-bold mb-5">
            <label>Confirm Password</label>
            <input type="password" placeholder="*******" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800">
        </div>
        <div class="flex justify-start gap-2 mb-5 sm:text-xs md:text-base">
            <input type="checkbox">
            <p>I agree to the</p>
            <a class="text-indigo-900">Terms of Service</a>
            <p> and </p>
            <a class="text-indigo-900">Privacy Policy.</a>
        </div>
        <div class="text-white font-bold text-lg mb-5">
        <button class="w-full bg-indigo-800 hover:scale-x-105 hover:bg-indigo-500 p-3 rounded-lg">Create My Account >></button>
        </div>
        <div class="flex justify-center gap-3">
            <p>Already have an account?</p>
            <a href="login.html" class="text-indigo-900">Sign in here</a>
        </div>
    </main>
</body>
</html>
